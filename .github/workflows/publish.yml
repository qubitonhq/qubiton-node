name: Publish

# Triggers:
# - Push of a tag matching v*  (e.g. `git tag v1.1.0 && git push --tags`)
# - Manual run via the Actions tab (workflow_dispatch)
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@qubiton/sdk
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Verify package version matches the tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF##*/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag ($TAG) does not match package.json version ($PKG_VERSION). Bump package.json before tagging."
            exit 1
          fi
          echo "Tag $TAG matches package.json version $PKG_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
